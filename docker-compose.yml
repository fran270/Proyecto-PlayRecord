version: '3.1'

services:
  php-env:
    build:   
      context: .
      dockerfile: Dockerfile
    volumes:
      -  C:/xampp/tmp:/tmp
      - ./servidor2/src:/var/www/html
    ports:
      - 8088:80
    environment:
      - UPLOAD_MAX_FILESIZE=50M
      - POST_MAX_SIZE=50M

  mysql_db:
    image: mysql:latest
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    
  phpmyadmin:
     image: phpmyadmin:latest
     restart: always
     ports:
        - 8089:80
     environment:
        - PMA_ARBITRARY=1
